name: Manimatio unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      checks: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Ensure submodules are present
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          test -f vcpkg/bootstrap-vcpkg.sh

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        
      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Configure Project
        run: nix develop -c cmake --preset nix-dev

      - name: Build tests
        run: nix develop -c cmake --build --preset nix-dev --target tests

      - name: Run unit tests
        run: |
          mkdir -p build/nix-dev/test-results
          nix develop -c ctest --preset nix-dev

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/nix-dev/test-results/*.xml