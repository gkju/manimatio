name: Manimatio unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      checks: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Ensure submodules are present
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          test -f vcpkg/bootstrap-vcpkg.sh

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        
      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Configure
        run: |
          echo "::group::Configure"
          nix develop -c cmake --preset nix-dev
          echo "::endgroup::"

      - name: Build (tests)
        run: |
          echo "::group::Build"
          nix develop -c cmake --build --preset nix-dev --target tests
          echo "::endgroup::"

      - name: Run tests (CTest)
        id: ctest
        continue-on-error: true
        run: |
          mkdir -p build/nix-dev/test-results
          echo "::group::CTest"
          nix develop -c ctest --preset nix-dev
          echo "::endgroup::"

      - name: Publish test results (Checks + Job Summary)
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/nix-dev/test-results/*.xml
          check_name: "CTest (nix-dev / ${{ github.event_name }})"
          job_summary: true
          fail_on: "test failures"
          action_fail: false
          comment_mode: ${{ github.event_name == 'pull_request' && 'changes' || 'off' }}

      - name: Upload test artifacts (JUnit + log)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/nix-dev/test-results/ctest-junit.xml
            build/nix-dev/test-results/ctest.log

      - name: Fail job if tests failed
        if: ${{ steps.ctest.outcome != 'success' }}
        run: exit 1