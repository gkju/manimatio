name: Manimatio unit tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      checks: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure submodules are present
        run: test -f vcpkg/bootstrap-vcpkg.sh

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg/downloads
            .vcpkg/bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Configure
        run: |
          echo "::group::Configure"
          nix develop -c cmake --preset nix-dev
          echo "::endgroup::"

      - name: Build
        run: |
          echo "::group::Build"
          nix develop -c cmake --build --preset nix-dev --target tests
          echo "::endgroup::"

      - name: Run tests
        id: ctest
        continue-on-error: true
        run: |
          mkdir -p build/nix-dev/test-results
          echo "::group::CTest"
          nix develop -c ctest --preset nix-dev
          echo "::endgroup::"

      - name: Test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v2
        with:
          name: "CTest (nix-dev / ${{ github.event_name }})"
          path: build/nix-dev/test-results/ctest.xml
          reporter: java-junit
          use-actions-summary: "true"
          only-summary: "false"
          list-suites: "all"
          list-tests: "all"
          max-annotations: "50"
          fail-on-error: "false"
          fail-on-empty: "true"

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/nix-dev/test-results/ctest.xml
            build/nix-dev/test-results/ctest.log

      - name: Fail job if tests failed
        if: ${{ steps.ctest.outcome != 'success' }}
        run: exit 1